services:
  mysql:
    image: mysql:8.4
    container_name: pets-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pets
      MYSQL_USER: pets
      MYSQL_PASSWORD: pets_password
      MYSQL_ROOT_PASSWORD: root_password
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - pets_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pets-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4000"
      DB_HOST: mysql
      DB_USER: pets
      DB_PASS: pets_password
      DB_NAME: pets
      JWT_SECRET: dev-secret
      GEMINI_API_KEY: ""
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        EXPO_PUBLIC_API_BASE_URL: http://localhost:4000
    container_name: pets-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pets_mysql_data:
